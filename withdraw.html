<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>سحب الأرباح - TAERX ELITE</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        :root { 
            --bg: #030008; --accent: #7d2ae8; --gold: #ffcc00; 
            --red: #ff4444; --glass: rgba(255, 255, 255, 0.03);
            --laser: rgba(125, 42, 232, 0.3);
        }

        * { box-sizing: border-box; outline: none; -webkit-tap-highlight-color: transparent; }

        body {
            margin: 0; background-color: var(--bg); color: #fff;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: radial-gradient(circle at 50% -20%, #1a0b3c, #030008);
            min-height: 100vh; padding: 20px 15px;
        }

        /* الهيدر */
        .page-header {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 30px; padding: 0 5px;
        }
        .back-btn {
            width: 45px; height: 45px; border-radius: 15px;
            background: var(--glass); border: 1px solid var(--laser);
            color: #fff; display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: 0.2s;
        }
        .back-btn:active { transform: scale(0.85); box-shadow: 0 0 15px var(--accent); }
        .page-title { font-size: 22px; font-weight: 900; }

        /* صندوق المبلغ */
        .withdraw-box {
            background: linear-gradient(145deg, rgba(255, 68, 68, 0.05), rgba(0,0,0,0.6));
            border: 1px solid rgba(255, 68, 68, 0.2); border-radius: 35px;
            padding: 30px 20px; text-align: center; margin-bottom: 30px;
            backdrop-filter: blur(10px);
        }
        .info-label { font-size: 11px; color: var(--gold); font-weight: 900; letter-spacing: 2px; margin-bottom: 10px; display: block; }
        .available-bal { font-size: 13px; color: rgba(255,255,255,0.5); margin-bottom: 15px; }

        .input-wrap { display: flex; align-items: center; justify-content: center; gap: 10px; }
        .input-wrap span { font-size: 40px; font-weight: 900; color: var(--red); }
        .withdraw-input {
            background: none; border: none; color: #fff; font-size: 45px; font-weight: 900;
            width: 160px; text-align: center; border-bottom: 2px solid rgba(255,68,68,0.2);
        }

        /* اختيار وسيلة السحب */
        .methods-title { font-size: 13px; font-weight: 900; color: var(--gold); margin-bottom: 15px; padding-right: 10px; }
        
        .method-item {
            background: var(--glass); border: 1px solid var(--laser);
            border-radius: 25px; padding: 18px; margin-bottom: 15px;
            display: flex; align-items: center; justify-content: space-between;
            cursor: pointer; transition: 0.2s;
        }
        .method-item:active { transform: scale(0.96); background: rgba(255, 68, 68, 0.05); border-color: var(--red); }
        
        .m-content { display: flex; align-items: center; gap: 15px; }
        .m-icon-box { 
            width: 45px; height: 45px; border-radius: 12px; 
            background: rgba(255,255,255,0.05); display: flex; 
            align-items: center; justify-content: center; font-size: 20px;
        }

        .m-name { font-weight: 900; font-size: 15px; }
        .m-note { font-size: 10px; color: rgba(255,255,255,0.4); }

        /* حقل رقم المحفظة */
        .wallet-input-field {
            background: rgba(255,255,255,0.03); border: 1px solid var(--laser);
            border-radius: 20px; padding: 15px 20px; width: 100%;
            color: #fff; font-weight: bold; margin-top: 10px; font-size: 14px;
        }

        /* زر السحب النهائي */
        .btn-confirm-withdraw {
            background: linear-gradient(135deg, var(--red), #880000);
            color: #fff; border: none; height: 65px; border-radius: 25px;
            width: 100%; margin-top: 30px; font-weight: 900; font-size: 18px;
            cursor: pointer; box-shadow: 0 10px 30px rgba(255, 0, 0, 0.2);
            transition: 0.2s;
        }
        .btn-confirm-withdraw:active { transform: scale(0.95); box-shadow: 0 0 20px var(--red); }

    </style>
</head>
<body>

    <div class="page-header">
        <div class="page-title">سحب الأرباح</div>
        <button class="back-btn" onclick="window.location.href='wallet.html'"><i class="fa-solid fa-chevron-left"></i></button>
    </div>

    <div class="withdraw-box">
        <span class="info-label">حدد مبلغ السحب</span>
        <div class="available-bal">رصيدك القابل للسحب: $80.00</div>
        <div class="input-wrap">
            <span>$</span>
            <input type="number" class="withdraw-input" placeholder="0.00" id="wAmount">
        </div>
    </div>

    <div class="methods-title">وسيلة الاستلام</div>

    <div class="methods-list">
        <div class="method-item" onclick="selectWithdraw('Zain')">
            <div class="m-content">
                <div class="m-icon-box" style="color:#ffcc00;"><i class="fa-solid fa-z"></i></div>
                <div>
                    <div class="m-name">Zain Cash - زين كاش</div>
                    <div class="m-note">يتم التحويل خلال 24 ساعة</div>
                </div>
            </div>
            <i class="fa-solid fa-circle-check" style="color: var(--red);"></i>
        </div>

        <input type="text" class="wallet-input-field" placeholder="أدخل رقم محفظة زين كاش">

        <p style="font-size: 11px; color: rgba(255,255,255,0.3); text-align: center; margin-top: 20px; padding: 0 10px;">
            * ملاحظة: يرجى التأكد من الرقم، الإدارة غير مسؤولة عن التحويل لأرقام خاطئة.
        </p>
    </div>

    <button class="btn-confirm-withdraw" onclick="sendWithdrawRequest()">
        إرسال طلب السحب
    </button>

    <script>
        function sendWithdrawRequest() {
            let val = document.getElementById('wAmount').value;
            if(val >= 5) {
                alert('تم إرسال طلب سحب بمبلغ $' + val + ' إلى الإدارة بنجاح.');
                window.location.href = 'wallet.html';
            } else {
                alert('الحد الأدنى للسحب هو $5.00');
            }
        }
    </script>
</body>
</html>
