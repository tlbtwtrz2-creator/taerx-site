<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>TAERX ELITE - OFFICIAL SYSTEM</title>
    
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        :root { 
            --bg: #030008; --accent: #7d2ae8; --gold: #ffcc00; 
            --green: #00ff88; --silver: #e0e0e0; --bronze: #cd7f32;
            --laser-border: rgba(125, 42, 232, 0.4);
        }

        * { box-sizing: border-box; outline: none; -webkit-tap-highlight-color: transparent; }

        body {
            margin: 0; background-color: var(--bg); color: #fff;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: radial-gradient(circle at 50% -20%, #1a0b3c, #030008);
            min-height: 100vh; padding-bottom: 120px; overflow-x: hidden;
        }

        /* الهيدر */
        .header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 20px; background: rgba(3, 0, 8, 0.7); 
            backdrop-filter: blur(20px); position: sticky; top: 0; z-index: 1000; 
            border-bottom: 1px solid var(--laser-border); height: 60px;
        }

        /* --- نظام إحساس الضغط المطور --- */
        .btn-action, .btn-prizes, .taerx-cancel-btn, .taerx-confirm-btn, 
        .taerx-close-red-btn, .user-pill, .notif-box {
            transition: transform 0.05s ease-out !important;
            cursor: pointer;
            user-select: none;
        }
        
        /* تقليص واضح جداً عند اللمس */
        .btn-action:active, .btn-prizes:active, .taerx-cancel-btn:active, 
        .taerx-confirm-btn:active, .taerx-close-red-btn:active, 
        .user-pill:active, .notif-box:active {
            transform: scale(0.88) !important;
        }

        .user-pill { display: flex; align-items: center; gap: 10px; background: rgba(125, 42, 232, 0.15); padding: 5px 15px; border-radius: 50px; border: 1.5px solid var(--accent); }
        .avatar-container { width: 36px; height: 36px; border-radius: 50%; border: 2px solid var(--gold); position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; background: #111; }
        
        .wallet-card { margin: 20px 15px; padding: 35px; border-radius: 40px; background: linear-gradient(135deg, rgba(125, 42, 232, 0.2), rgba(0,0,0,0.95)); border: 2px solid var(--accent); text-align: center; box-shadow: 0 10px 40px rgba(0,0,0,0.5); }
        .balance-amount { font-size: 42px; font-weight: 900; text-shadow: 0 0 20px var(--accent); }

        .grid { display: grid; grid-template-columns: 1fr; gap: 20px; padding: 0 15px; }
        .card { background: rgba(255, 255, 255, 0.03); border: 1px solid var(--laser-border); border-radius: 45px; padding: 20px; display: flex; justify-content: space-between; align-items: center; height: 160px; position: relative; overflow: hidden; }
        .price-val { font-size: 24px; font-weight: 900; color: #fff; background: rgba(125, 42, 232, 0.2); padding: 4px 12px; border-radius: 12px; border: 1.5px solid var(--accent); min-width: 70px; text-align: center; }

        .radar-box { width: 90px; height: 90px; position: relative; }
        .radar-svg { transform: rotate(-90deg); width: 90px; height: 90px; }
        .radar-track { fill: none; stroke: rgba(125, 42, 232, 0.1); stroke-width: 6; }
        .radar-fill { fill: none; stroke: var(--accent); stroke-width: 6; stroke-linecap: round; stroke-dasharray: 251.2; transition: all 0.8s ease; }
        .radar-gold-active { stroke: var(--gold) !important; filter: drop-shadow(0 0 8px var(--gold)); }
        .radar-content { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .live-dot { width: 8px; height: 8px; background: var(--green); border-radius: 50%; margin-bottom: 4px; box-shadow: 0 0 10px var(--green); animation: pulse 2s infinite ease-in-out; }
        @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.2); opacity: 0.7; } }

        .actions { display: flex; flex-direction: column; gap: 10px; width: 180px; flex-shrink: 0; }
        
        .btn-action { 
            background: linear-gradient(135deg, var(--accent), #5a1faf); color: #fff; border: none; height: 55px; border-radius: 22px; font-weight: 900; font-size: 14px; display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .btn-subscribed-gold { background: #000 !important; border: 2.5px solid var(--gold) !important; color: var(--gold) !important; animation: btnPulse 1.5s infinite; }
        @keyframes btnPulse { 0%, 100% { box-shadow: 0 0 8px rgba(255, 204, 0, 0.2); } 50% { box-shadow: 0 0 18px rgba(255, 204, 0, 0.5); } }
        
        .btn-prizes { 
            background: rgba(255, 255, 255, 0.05); color: #fff; border: 1px solid rgba(255, 255, 255, 0.1); height: 45px; border-radius: 20px; font-size: 12px; font-weight: 900;
        }

        .btn-locked { opacity: 0.4 !important; pointer-events: none !important; }
        .spinner { width: 16px; height: 16px; border: 3px solid rgba(255,255,255,0.2); border-top: 3px solid var(--gold); border-radius: 50%; animation: spin 0.8s linear infinite; display: none; }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        .taerx-popup { 
            background: rgba(5, 0, 15, 0.98) !important; border: 2px solid var(--accent) !important; 
            border-radius: 50px !important; box-shadow: 0 0 80px rgba(125, 42, 232, 0.3) !important; 
            padding: 35px 5px !important; width: 98% !important; backdrop-filter: blur(30px);
        }

        .taerx-cancel-btn {
            background: #990000 !important; color: #fff !important; 
            border-radius: 25px !important; height: 55px !important; width: 100% !important;
            font-weight: 900 !important; border: none !important; margin-top: 20px; font-size: 18px;
            box-shadow: 0 4px 15px rgba(153, 0, 0, 0.4); display: flex; align-items: center; justify-content: center;
        }

        .taerx-confirm-btn { 
            background: linear-gradient(135deg, var(--accent), #5a1faf) !important;
            color: #fff !important; border-radius: 25px !important; height: 55px !important; width: 100% !important;
            font-weight: 900 !important; border: none !important; box-shadow: 0 8px 20px rgba(125, 42, 232, 0.3) !important;
            font-size: 16px;
        }

        .x-draw { stroke-dasharray: 100; stroke-dashoffset: 100; animation: drawX 2s ease-out forwards; }
        @keyframes drawX { to { stroke-dashoffset: 0; } }

        .prize-row { 
            display: flex; align-items: center; justify-content: space-between; 
            padding: 0 18px; border-radius: 25px; margin-bottom: 12px; 
            height: 85px; width: 100%; position: relative; overflow: hidden;
            background: linear-gradient(145deg, rgba(255,255,255,0.05) 0%, rgba(0,0,0,0.9) 100%);
            border: 1px solid rgba(255, 255, 255, 0.03);
        }
        .gold-row { border-left: 6px solid var(--gold) !important; }
        .silver-row { border-left: 6px solid var(--silver) !important; }
        .bronze-row { border-left: 6px solid var(--bronze) !important; }

        .shine-layer {
            position: absolute; top: 0; left: -100%; width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.12), transparent);
            transform: skewX(-25deg); animation: moveShine 3s infinite linear; pointer-events: none;
        }
        @keyframes moveShine { 0% { left: -120%; } 35% { left: 120%; } 100% { left: 120%; } }

        .big-rank-num { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); font-size: 75px; font-weight: 900; color: rgba(255,255,255,0.04); font-family: 'Impact', sans-serif; pointer-events: none; z-index: 1; }
        .label-wrap { display: flex; flex-direction: column; z-index: 5; text-align: right; flex: 1; margin-right: 5px; }
        .rank-top-text { font-size: 10px; color: var(--accent); font-weight: 900; text-transform: uppercase; letter-spacing: 2px; }
        .rank-main-text { font-size: 20px; font-weight: 900; color: #fff; text-shadow: 0 0 10px rgba(255,255,255,0.2); }
        .amount-wrap { z-index: 5; text-align: left; display: flex; flex-direction: column; align-items: flex-end; min-width: 120px; }
        .amount-num { font-size: 36px; font-weight: 900; filter: drop-shadow(0 0 8px currentColor); }
        .currency { font-size: 10px; color: rgba(255,255,255,0.4); font-weight: bold; }

        .taerx-close-red-btn { 
            background: #990000 !important; color: #fff !important; border-radius: 25px !important; height: 60px !important; width: 85% !important; font-weight: 900 !important; border: none !important; margin: 25px auto 0 !important; box-shadow: 0 10px 30px rgba(153, 0, 0, 0.4) !important; display: flex; align-items: center; justify-content: center;
        }
        .nav-hidden { display: none !important; }
    </style>
</head>
<body>

    <header class="header">
        <div class="notif-box" onclick="setTimeout(()=>window.location.href='messages.html', 150)"><i class="fa-regular fa-bell" style="font-size: 20px; color: var(--gold);"></i></div>
        <div class="user-pill" onclick="setTimeout(()=>window.location.href='profile.html', 150)">
            <div style="text-align: right">
                <div class="global-name" style="font-size: 13px; font-weight: 900; color:#fff;">محمد زكو</div>
                <div style="font-size: 9px; color: var(--gold); font-weight: bold;">ID: 1758740</div>
            </div>
            <div class="avatar-container"><i class="fa-solid fa-user"></i></div>
        </div>
    </header>

    <div class="wallet-card">
        <div style="font-size:12px; color:var(--gold); font-weight:900;">رصيد محفظة</div>
        <div class="balance-amount"><span id="user-balance">80.00</span> $</div>
    </div>

    <div class="grid" id="matches-grid"></div>

    <script>
        let isProcessing = false;

        function toggleNav(show) {
            const nav = document.querySelector('nav') || document.querySelector('.bottom-nav') || document.querySelector('.nav-bar-vip');
            if (nav) { if (show) nav.classList.remove('nav-hidden'); else nav.classList.add('nav-hidden'); }
        }

        let matches = [
            { id: '1', fee: 5, p1: 60, p2: 40, p3: 20, players: 7 },
            { id: '2', fee: 10, p1: 120, p2: 80, p3: 40, players: 7 },
            { id: '3', fee: 25, p1: 300, p2: 200, p3: 100, players: 22 },
            { id: '4', fee: 50, p1: 600, p2: 400, p3: 200, players: 12 },
            { id: '5', fee: 100, p1: 1200, p2: 800, p3: 400, players: 3 }
        ];

        function render() {
            document.getElementById('matches-grid').innerHTML = matches.map(m => {
                const offset = 251.2 - (251.2 * (m.players / 25));
                return `
                <div class="card">
                    <div class="radar-section">
                        <div class="price-val">$${m.fee}</div>
                        <div class="radar-box" style="margin-top:5px;">
                            <svg class="radar-svg" viewBox="0 0 90 90"><circle class="radar-track" cx="45" cy="45" r="40"/><circle class="radar-fill" id="circle-${m.id}" cx="45" cy="45" r="40" style="stroke-dashoffset: ${offset};"/></svg>
                            <div class="radar-content"><div class="live-dot"></div><div id="players-count-${m.id}" style="font-weight:900;">${m.players}/25</div></div>
                        </div>
                    </div>
                    <div class="actions">
                        <button class="btn-action" id="btn-${m.id}" onclick="handleMatchAction('${m.id}', ${m.fee})"><div class="spinner" id="spin-${m.id}"></div><span id="txt-${m.id}">تسجيل في البطولة</span></button>
                        <button class="btn-prizes" id="prizebtn-${m.id}" onclick="showPrizes('${m.id}')">تفاصيل الجوائز</button>
                    </div>
                </div>`;
            }).join('');
        }

        function handleMatchAction(id, fee) {
            if (isProcessing) return;
            let balEl = document.getElementById('user-balance');
            let currentBal = parseFloat(balEl.innerText);
            
            // تأخير 50ms للسماح برؤية تأثير الضغط (scale)
            setTimeout(() => {
                toggleNav(false);
                if (currentBal < fee) {
                    Swal.fire({
                        showConfirmButton: false,
                        html: `
                            <div style="text-align: center; color: #fff;">
                                <div style="width: 100px; height: 100px; border: 4px solid #ff4444; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 30px; background: rgba(255,0,0,0.05);">
                                    <svg width="60" height="60" viewBox="0 0 100 100">
                                        <path class="x-draw" d="M30 30 L70 70 M70 30 L30 70" stroke="#ff4444" stroke-width="8" stroke-linecap="round" fill="none"/>
                                    </svg>
                                </div>
                                <h2 style="font-weight: 900; margin-bottom: 10px;">تنبيه</h2>
                                <p style="font-size: 16px; opacity: 0.8; margin-bottom: 25px;">رصيد محفظتك غير كافٍ</p>
                                <button onclick="Swal.close();" class="taerx-cancel-btn">إلغاء</button>
                            </div>
                        `,
                        background: 'transparent', customClass: { popup: 'taerx-popup' }
                    }).then(() => toggleNav(true));
                } else {
                    Swal.fire({
                        customClass: { popup: 'taerx-popup' },
                        background: 'transparent', showConfirmButton: false,
                        html: `
                            <div style="background:rgba(125,42,232,0.1); border:1.5px solid var(--gold); padding:20px; border-radius:25px; color:var(--gold); font-size:30px; font-weight:900; margin-bottom:20px;">$${fee}</div>
                            <h2 style="color:#fff; font-weight:900; margin-bottom: 25px;">تأكيد الاشتراك</h2>
                            <button onclick="Swal.clickConfirm();" class="taerx-confirm-btn">تأكيد العملية</button>
                            <button onclick="Swal.close();" class="taerx-cancel-btn">إلغاء</button>
                        `,
                    }).then((result) => {
                        if (result.isConfirmed) {
                            isProcessing = true;
                            balEl.innerText = (parseFloat(balEl.innerText) - fee).toFixed(2);
                            const match = matches.find(m => m.id === id);
                            if (match) {
                                match.players += 1;
                                document.getElementById(`players-count-${id}`).innerText = `${match.players}/25`;
                                const circle = document.getElementById(`circle-${id}`);
                                circle.style.strokeDashoffset = 251.2 - (251.2 * (match.players / 25));
                                circle.classList.add('radar-gold-active');
                            }
                            const btn = document.getElementById(`btn-${id}`);
                            btn.classList.add('btn-subscribed-gold');
                            document.getElementById(`spin-${id}`).style.display = "block";
                            document.querySelectorAll('.btn-action, .btn-prizes').forEach(b => b.classList.add('btn-locked'));
                            let time = 10;
                            const timer = setInterval(() => {
                                time--;
                                document.getElementById(`txt-${id}`).innerText = `تحميل.. ${time}`;
                                if (time <= 0) { clearInterval(timer); window.location.replace('lobby.html'); }
                            }, 1000);
                        } else { toggleNav(true); }
                    });
                }
            }, 50);
        }

        function showPrizes(id) {
            if (isProcessing) return;
            const m = matches.find(x => x.id === id);
            
            // تأخير 50ms للسماح برؤية تأثير الضغط
            setTimeout(() => {
                toggleNav(false);
                Swal.fire({
                    customClass: { popup: 'taerx-popup' }, background: 'transparent', showConfirmButton: false,
                    html: `<div style="text-align: center;">
                        <div style="margin-bottom: 25px;">
                            <div style="font-size: 11px; color: var(--accent); font-weight: 900; letter-spacing: 4px; opacity: 0.7;">TAERX ELITE REWARDS</div>
                            <div style="font-size: 24px; font-weight: 900; color: #fff;">جوائز البطولة</div>
                        </div>
                        <div class="prize-row gold-row"><div class="shine-layer"></div><div class="big-rank-num">1st</div><div class="label-wrap"><span class="rank-top-text">CHAMPION <i class="fa-solid fa-trophy" style="color:var(--gold); margin-right:5px;"></i></span><span class="rank-main-text">المركز الأول</span></div><div class="amount-wrap"><span class="amount-num" style="color:var(--gold);">$${m.p1}</span><span class="currency">CASH PRIZE</span></div></div>
                        <div class="prize-row silver-row"><div class="shine-layer"></div><div class="big-rank-num">2nd</div><div class="label-wrap"><span class="rank-top-text">ELITE WINNER <i class="fa-solid fa-trophy" style="color:var(--silver); margin-right:5px;"></i></span><span class="rank-main-text">المركز الثاني</span></div><div class="amount-wrap"><span class="amount-num" style="color:var(--silver);">$${m.p2}</span><span class="currency">CASH PRIZE</span></div></div>
                        <div class="prize-row bronze-row"><div class="shine-layer"></div><div class="big-rank-num">3rd</div><div class="label-wrap"><span class="rank-top-text">WARRIOR <i class="fa-solid fa-trophy" style="color:var(--bronze); margin-right:5px;"></i></span><span class="rank-main-text">المركز الثالث</span></div><div class="amount-wrap"><span class="amount-num" style="color:var(--bronze);">$${m.p3}</span><span class="currency">CASH PRIZE</span></div></div>
                        <button onclick="Swal.close()" class="taerx-close-red-btn">إغلاق</button>
                    </div>`
                }).then(() => toggleNav(true));
            }, 50);
        }
       window.onload = function () {
    render();

    // جلب الاسم
    const fn = localStorage.getItem('firstName');
    const fa = localStorage.getItem('fatherName');
    const gn = localStorage.getItem('grandName');

    if (fn && fa && gn) {
        document.querySelector('.global-name').innerText = fn + " " + fa + " " + gn;
    }

    // جلب الصورة
    const avatar = localStorage.getItem('userAvatar');
    if (avatar) {
        document.querySelector('.avatar-container').innerHTML = 
            `<img src="${avatar}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;">`;
    }
}
    </script>
    <script src="nav.js"></script>
</body>
</html>
