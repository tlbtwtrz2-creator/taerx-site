<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>نظام الإحالة الملكي - TAERX ELITE</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <style>
        :root { 
            --bg: #030008; --accent: #7d2ae8; --gold: #ffcc00; 
            --green: #00ff88; --glass: rgba(255, 255, 255, 0.03);
            --laser: rgba(125, 42, 232, 0.3);
        }

        /* منع التداخل مع الشريط السفلي */
        * { box-sizing: border-box; outline: none; -webkit-tap-highlight-color: transparent; }

        body {
            margin: 0; background-color: var(--bg); color: #fff;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: radial-gradient(circle at 50% -20%, #1a0b3c, #030008);
            min-height: 100vh; padding: 25px 15px;
            padding-bottom: 120px; /* مساحة كافية للشريط السفلي */
        }

        .page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 30px; }
        .back-btn {
            width: 48px; height: 48px; border-radius: 18px;
            background: rgba(125, 42, 232, 0.1); border: 1.5px solid var(--accent);
            color: #fff; display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: 0.3s;
        }
        .back-btn:active { transform: scale(0.8); background: var(--accent); }

        .referral-stats {
            background: linear-gradient(145deg, rgba(125, 42, 232, 0.2), rgba(0,0,0,0.8));
            border: 2px solid var(--laser); border-radius: 35px;
            padding: 25px; display: flex; justify-content: space-around;
            margin-bottom: 25px; backdrop-filter: blur(10px);
        }
        .stat-item { text-align: center; }
        .stat-val { font-size: 24px; font-weight: 900; color: var(--green); display: block; text-shadow: 0 0 10px var(--green); }
        .stat-label { font-size: 11px; color: var(--gold); font-weight: bold; margin-top: 5px; opacity: 0.8; }

        .share-main-card {
            background: var(--glass); border: 1px solid var(--laser);
            border-radius: 40px; padding: 35px 20px; text-align: center;
            position: relative; z-index: 5; /* لضمان التفاعل */
        }
        .gift-box {
            width: 80px; height: 80px; background: rgba(0, 255, 136, 0.1);
            border-radius: 25px; display: flex; align-items: center; justify-content: center;
            margin: 0 auto 20px; font-size: 35px; color: var(--green);
            border: 1px solid var(--green);
        }

        .ref-link-container {
            background: rgba(0,0,0,0.6); border: 1.5px dashed var(--accent);
            border-radius: 22px; padding: 18px; margin-top: 10px;
            display: flex; align-items: center; justify-content: space-between;
            cursor: pointer; position: relative; z-index: 10;
        }
        .ref-link-container:active { transform: scale(0.96); background: rgba(125, 42, 232, 0.2); }
        .url-txt { font-size: 11px; font-weight: 900; color: var(--accent); width: 85%; overflow: hidden; text-align: left; pointer-events: none; }

        .social-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin: 25px 0; position: relative; z-index: 10; }
        .s-btn {
            height: 55px; border-radius: 18px; background: var(--glass);
            border: 1px solid var(--laser); display: flex; align-items: center;
            justify-content: center; font-size: 22px; cursor: pointer;
        }
        .s-btn:active { transform: scale(0.9); }

        .btn-copy-master {
            background: linear-gradient(135deg, var(--accent), #5a1faf);
            color: #fff; border: none; height: 65px; border-radius: 25px;
            width: 100%; font-weight: 900; font-size: 17px;
            cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px;
            position: relative; z-index: 10; margin-bottom: 20px;
        }
        .btn-copy-master:active { transform: scale(0.95); }

    </style>
</head>
<body>

    <div class="page-header">
        <div class="page-title">نظام الإحالة</div>
        <button class="back-btn" onclick="window.location.href='login.html'"><i class="fa-solid fa-chevron-left"></i></button>
    </div>

    <div class="referral-stats">
        <div class="stat-item">
            <span class="stat-val">$12.50</span>
            <span class="stat-label">أرباح الإحالة</span>
        </div>
        <div style="width: 1px; background: var(--laser); height: 40px; align-self: center;"></div>
        <div class="stat-item">
            <span class="stat-val" style="color: #fff;">25</span>
            <span class="stat-label">صديق مُسجل</span>
        </div>
    </div>

    <div class="share-main-card">
        <div class="gift-box"><i class="fa-solid fa-hand-holding-dollar"></i></div>
        <h1 style="font-size: 20px; font-weight: 900;">اربح عن كل صديق!</h1>
        <p style="font-size: 13px; color: rgba(255,255,255,0.5); line-height: 1.5;">لكل شخص يسجل من خلال رابطك ويقوم بأول عملية إيداع، ستحصل أنت على مكافأة مالية تضاف لمحفظتك فوراً.</p>

        <div class="ref-link-container" onclick="copyRefLink()">
            <div class="url-txt" id="refLink">https://taerx-elite.com/join?ref=1758740</div>
            <i class="fa-solid fa-copy" style="color: var(--gold); pointer-events: none;"></i>
        </div>
    </div>

    <div class="social-row">
        <div class="s-btn" onclick="shareTo('wa')" style="color:#25D366;"><i class="fa-brands fa-whatsapp"></i></div>
        <div class="s-btn" onclick="shareTo('tg')" style="color:#0088cc;"><i class="fa-brands fa-telegram"></i></div>
        <div class="s-btn" onclick="shareTo('fb')" style="color:#1877F2;"><i class="fa-brands fa-facebook"></i></div>
    </div>

    <button class="btn-copy-master" onclick="copyRefLink()">
        <i class="fa-solid fa-share-nodes"></i> نسخ الرابط وبدء الربح
    </button>

    <script src="nav.js"></script>

    <script>
        function copyRefLink() {
            const link = document.getElementById('refLink').innerText;
            navigator.clipboard.writeText(link).then(() => {
                Swal.fire({
                    icon: 'success',
                    title: 'تم نسخ الرابط!',
                    background: '#05020a',
                    color: '#fff',
                    confirmButtonColor: '#7d2ae8',
                    showConfirmButton: false,
                    timer: 1500
                });
            }).catch(err => {
                console.error('خطأ في النسخ: ', err);
            });
        }

        function shareTo(p) {
            const link = encodeURIComponent(document.getElementById('refLink').innerText);
            let url = '';
            if(p === 'wa') url = `https://wa.me/?text=${link}`;
            if(p === 'tg') url = `https://t.me/share/url?url=${link}`;
            if(p === 'fb') url = `https://www.facebook.com/sharer/sharer.php?u=${link}`;
            window.open(url, '_blank');
        }
    </script>
</body>
</html>
