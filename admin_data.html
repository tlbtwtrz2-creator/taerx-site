<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TAERX ELITE | إدارة المتسابقين</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    <style>
        :root { 
            --bg: #030008; 
            --accent: #7d2ae8; 
            --gold: #ffcc00; 
            --green: #00ff88;
            --laser-border: rgba(125, 42, 232, 0.4);
        }

        body {
            margin: 0; background-color: var(--bg); color: #fff;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: radial-gradient(circle at 50% 50%, #1a0b3c, #030008);
            padding: 20px;
        }

        /* الهيدر */
        .admin-header {
            text-align: center; margin-bottom: 30px; border-bottom: 2px solid var(--laser-border);
            padding-bottom: 20px;
        }
        .admin-header h1 { font-size: 24px; font-weight: 900; color: var(--gold); margin: 0; }
        .stats-bar { display: flex; justify-content: center; gap: 20px; margin-top: 15px; }
        .stat-item { background: rgba(125, 42, 232, 0.1); padding: 10px 20px; border-radius: 15px; border: 1px solid var(--accent); }

        /* حاوية الجدول */
        .table-container {
            background: rgba(255, 255, 255, 0.02); border-radius: 25px;
            border: 1px solid var(--laser-border); overflow: hidden;
            backdrop-filter: blur(15px);
        }

        table { width: 100%; border-collapse: collapse; text-align: center; }
        
        thead { background: rgba(125, 42, 232, 0.2); }
        th { padding: 15px; font-size: 13px; color: var(--gold); border-bottom: 1.5px solid var(--laser-border); }
        
        td { padding: 12px; font-size: 14px; border-bottom: 1px solid rgba(255,255,255,0.05); }

        .player-img { width: 40px; height: 40px; border-radius: 50%; border: 1.5px solid var(--gold); object-fit: cover; }
        
        /* حالة الدفع */
        .status-badge {
            padding: 5px 12px; border-radius: 10px; font-size: 11px; font-weight: 900;
            background: rgba(0, 255, 136, 0.1); color: var(--green); border: 1px solid var(--green);
        }

        .empty-seat { color: rgba(255,255,255,0.1); font-style: italic; }

        /* زر الرجوع */
        .back-btn {
            display: inline-block; margin-bottom: 15px; color: #fff; text-decoration: none;
            font-weight: 900; font-size: 14px; background: var(--accent); padding: 10px 20px;
            border-radius: 12px; box-shadow: 0 5px 15px rgba(125, 42, 232, 0.3);
        }
    </style>
</head>
<body>

    <a href="login.html" class="back-btn"><i class="fa-solid fa-arrow-right"></i> رجوع للرئيسية</a>

    <div class="admin-header">
        <h1>بيانات فرسان TAERX</h1>
        <div class="stats-bar">
            <div class="stat-item">المقاعد المحجوزة: <span id="booked-count" style="color:var(--green)">1</span> / 25</div>
            <div class="stat-item">إجمالي الرسوم: <span id="total-fees" style="color:var(--gold)">$0</span></div>
        </div>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>#</th>
                    <th>الصورة</th>
                    <th>الاسم الثلاثي</th>
                    <th>ID الحساب</th>
                    <th>الحالة</th>
                </tr>
            </thead>
            <tbody id="players-body">
                </tbody>
        </table>
    </div>

    <script>
        function loadAdminData() {
            const tbody = document.getElementById('players-body');
            tbody.innerHTML = '';

            // جلب بياناتك أنت كأول متسابق (للاختبار)
            const myName = (localStorage.getItem('firstName') || 'المتحدي') + " " + 
                           (localStorage.getItem('fatherName') || '') + " " + 
                           (localStorage.getItem('grandName') || '');
            const myAvatar = localStorage.getItem('userAvatar') || 'https://via.placeholder.com/50/111/fff?text=T';
            const myID = "1758740";

            // توليد 25 خانة
            for (let i = 1; i <= 25; i++) {
                const tr = document.createElement('tr');
                
                if (i === 1) { // مثال على متسابق مسجل (أنت)
                    tr.innerHTML = `
                        <td>${i}</td>
                        <td><img src="${myAvatar}" class="player-img"></td>
                        <td style="font-weight:900;">${myName}</td>
                        <td><span style="color:var(--gold)">${myID}</span></td>
                        <td><span class="status-badge">تم الدفع</span></td>
                    `;
                } else { // مقاعد فارغة بانتظار البقية
                    tr.innerHTML = `
                        <td>${i}</td>
                        <td><div style="width:40px; height:40px; border-radius:50%; background:rgba(255,255,255,0.05); margin:auto; display:flex; align-items:center; justify-content:center; color:rgba(255,255,255,0.1)"><i class="fa-solid fa-user-clock"></i></div></td>
                        <td class="empty-seat">بانتظار متسابق...</td>
                        <td class="empty-seat">-----</td>
                        <td class="empty-seat">غير نشط</td>
                    `;
                }
                tbody.appendChild(tr);
            }
        }

        window.onload = loadAdminData;
    </script>
</body>
</html>
