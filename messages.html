<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>الرسائل والإشعارات - TAERX ELITE</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        :root { 
            --bg: #030008; --accent: #7d2ae8; --gold: #ffcc00; 
            --laser-border: rgba(125, 42, 232, 0.4);
        }

        * { box-sizing: border-box; outline: none; -webkit-tap-highlight-color: transparent; }

        body {
            margin: 0; background-color: var(--bg); color: #fff;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: radial-gradient(circle at 50% -20%, #1a0b3c, #030008);
            min-height: 100vh; padding: 20px 15px;
        }

        /* عنوان الصفحة وزر العودة */
        .page-header {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 30px; padding: 0 5px;
        }
        
        /* زر الرجوع مع تأثير الانداس */
        .back-btn {
            width: 45px; height: 45px; border-radius: 15px;
            background: rgba(125, 42, 232, 0.1); border: 1px solid var(--accent);
            color: #fff; display: flex; align-items: center; justify-content: center;
            font-size: 18px; cursor: pointer; transition: transform 0.1s;
        }
        .back-btn:active { transform: scale(0.9); }
        
        .page-title { font-size: 22px; font-weight: 900; letter-spacing: 1px; }

        /* قائمة الإشعارات */
        .notif-list { display: flex; flex-direction: column; gap: 15px; }

        .notif-card {
            background: rgba(255, 255, 255, 0.03); border: 1px solid var(--laser-border);
            border-radius: 30px; padding: 20px; display: flex; align-items: center; gap: 15px;
            position: relative; transition: transform 0.1s, background 0.3s;
            cursor: pointer;
        }
        
        /* تأثير الانداس للبطاقة */
        .notif-card:active { transform: scale(0.96); background: rgba(125, 42, 232, 0.1); }

        /* التوهج للإشعارات غير المقروءة */
        .notif-card.unread {
            border: 1px solid var(--accent);
            box-shadow: 0 0 15px rgba(125, 42, 232, 0.2);
        }

        .icon-box {
            width: 55px; height: 55px; border-radius: 18px;
            background: rgba(125, 42, 232, 0.2); display: flex;
            align-items: center; justify-content: center; font-size: 24px;
            color: var(--accent); border: 1px solid var(--laser-border);
            filter: drop-shadow(0 0 5px var(--accent));
        }

        .content-box { flex: 1; }
        .notif-title { font-size: 16px; font-weight: 900; margin-bottom: 4px; color: #fff; }
        .notif-desc { font-size: 13px; color: rgba(255,255,255,0.6); line-height: 1.4; }
        .notif-time { font-size: 10px; color: var(--gold); margin-top: 8px; font-weight: bold; opacity: 0.8; }

        /* علامة إشعار جديد مع توهج */
        .new-dot {
            width: 10px; height: 10px; background: var(--accent);
            border-radius: 50%; box-shadow: 0 0 10px var(--accent);
            position: absolute; top: 20px; left: 20px;
        }

    </style>
</head>
<body>

    <div class="page-header">
        <div class="page-title">الإشعارات</div>
        <button class="back-btn" onclick="window.location.href='login.html'"><i class="fa-solid fa-chevron-left"></i></button>
    </div>

    <div class="notif-list">
        
        <div class="notif-card unread">
            <div class="new-dot"></div>
            <div class="icon-box"><i class="fa-solid fa-wallet"></i></div>
            <div class="content-box">
                <div class="notif-title">تم الإيداع بنجاح</div>
                <div class="notif-desc">تم إضافة $80.00 إلى محفظتك. يمكنك الآن المشاركة في البطولات.</div>
                <div class="notif-time">منذ 5 دقائق</div>
            </div>
        </div>

        <div class="notif-card unread">
            <div class="new-dot"></div>
            <div class="icon-box"><i class="fa-solid fa-trophy"></i></div>
            <div class="content-box">
                <div class="notif-title">بطولة جديدة متاحة</div>
                <div class="notif-desc">بطولة النخبة الكبرى بدأت الآن! سجل مكانك قبل فوات الأوان.</div>
                <div class="notif-time">منذ ساعتين</div>
            </div>
        </div>

        <div class="notif-card">
            <div class="icon-box" style="color: var(--gold); border-color: var(--gold);"><i class="fa-solid fa-shield-halved"></i></div>
            <div class="content-box">
                <div class="notif-title">أمان الحساب</div>
                <div class="notif-desc">تم تسجيل الدخول إلى حسابك من جهاز جديد بنجاح.</div>
                <div class="notif-time">يوم أمس</div>
            </div>
        </div>

    </div>

</body>
</html>
